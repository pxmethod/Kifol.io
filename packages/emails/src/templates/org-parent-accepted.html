<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A parent connected to {{ORG_NAME}}</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f5f5f5; font-family: Arial, sans-serif;">
  <div style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
    <div style="background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);">
      <h1 style="color: #1f2937; font-size: 24px; margin-bottom: 20px; text-align: center;">
        A parent has connected to {{ORG_NAME}}
      </h1>

      <p style="color: #4b5563; font-size: 16px; line-height: 1.6; margin-bottom: 24px;">
        <strong>{{PARENT_EMAIL}}</strong> has accepted your invite and connected
        <strong>{{STUDENT_NAME}}</strong> to {{ORG_NAME}}.
      </p>

      <div style="text-align: center; margin: 30px 0;">
        <a href="{{MEMBERS_URL}}" style="display: inline-block; background-color: #7c3aed; color: white; padding: 14px 28px; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 16px;">
          View members
        </a>
      </div>
    </div>
  </div>
</body>
</html>
